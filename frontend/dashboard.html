<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard | AI Interview Simulator</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Custom CSS -->

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg navbar-dark glass-nav">

        <div class="container">

            <a class="navbar-brand fw-bold" href="#">

                🤖 AI Interview Simulator

            </a>

            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navMenu">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse justify-content-end" id="navMenu">

                <ul class="navbar-nav align-items-center">

                    <li class="nav-item">

                        <a href="dashboard.html" class="nav-link active">

                            Dashboard

                        </a>

                    </li>

                    <li class="nav-item ms-lg-3">

                        <button class="btn btn-danger px-4" id="logoutBtn">

                            Logout

                        </button>

                    </li>

                </ul>

            </div>

        </div>

    </nav>

    <!-- Hero -->

    <section class="container py-5">

        <div class="hero-card">

            <div class="row align-items-center">

                <div class="col-lg-8">

                    <h1 id="welcomeUser"></h1>

                    <p class="lead mt-3">

                        Practice AI powered mock interviews and improve your
                        confidence before your dream job.

                    </p>

                    <button class="btn btn-lg start-btn mt-3"
                        id="createInterviewBtn">

                        <i class="bi bi-stars"></i>

                        Create Interview

                    </button>

                </div>

                <div class="col-lg-4 text-center">

                    <img src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png"
                        class="img-fluid robot-img">

                </div>

            </div>

        </div>

    </section>

    <!-- Statistics -->

    <section class="container mb-5">

        <div class="row g-4">

            <div class="col-md-4">

                <div class="stats-card">

                    <i class="bi bi-file-earmark-text"></i>

                    <h2 id="totalInterviews">

                        0

                    </h2>

                    <p>Total Interviews</p>

                </div>

            </div>

            <div class="col-md-4">

                <div class="stats-card">

                    <i class="bi bi-trophy-fill"></i>

                    <h2 id="bestScore">

                        0%

                    </h2>

                    <p>Best Score</p>

                </div>

            </div>

            <div class="col-md-4">

                <div class="stats-card">

                    <i class="bi bi-graph-up-arrow"></i>

                    <h2>

                        0%

                    </h2>

                    <p>Accuracy</p>

                </div>

            </div>

        </div>

    </section>

    <!-- Interview History -->

    <section class="container pb-5">

        <div class="history-card">

            <div class="d-flex justify-content-between align-items-center mb-4">

                <h2>

                    Recent Interviews

                </h2>

                <button class="btn btn-outline-light">

                    View All

                </button>

            </div>

            <div class="table-responsive">

                <table class="table table-dark table-hover align-middle">

                    <thead>

                        <tr>

                            <th>Date</th>

                            <th>Role</th>

                            <th>Score</th>

                            <th>Status</th>

                        </tr>

                    </thead>

                    <tbody id="historyTable">

                        <tr>

                            <td colspan="4" class="text-center">

                                No Interviews Yet

                            </td>

                        </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>

    <script src="js/script.js"></script>

</body>

</html>
